name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install & Test
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install pytest pytest-asyncio
          pytest tests/ -x -q 2>/dev/null || echo "No tests yet"

  deploy-api:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Create D1 database (idempotent)
        continue-on-error: true
        working-directory: deploy/workers
        run: wrangler d1 create drift_inspector || true

      - name: Apply D1 schema
        continue-on-error: true
        working-directory: deploy/workers
        run: |
          DB_ID=$(wrangler d1 list --json 2>/dev/null | python3 -c "import sys,json; dbs=json.load(sys.stdin); print([d['uuid'] for d in dbs if d.get('name')=='drift_inspector'][0])" 2>/dev/null || echo "")
          if [ -n "$DB_ID" ]; then
            wrangler d1 execute drift_inspector --remote --file=../d1/schema.sql
          fi

      - name: Deploy to Cloudflare Workers
        working-directory: deploy/workers
        run: wrangler deploy --minify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Smoke test
        run: |
          sleep 5
          curl -fsS https://tfstate-drift-inspector.scottrmhardie.workers.dev/health | python3 -m json.tool

  deploy-frontend:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ github.event.repository.name }}-frontend
          directory: deploy/frontend
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-landing:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy landing page to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ github.event.repository.name }}-landing
          directory: deploy/landing
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}